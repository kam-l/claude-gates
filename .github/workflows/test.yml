name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
      - run: git diff --exit-code scripts/
      - run: npx c8 --reporter=text --reporter=lcov node scripts/PipelineTest.js
      - run: npx c8 --reporter=text --reporter=lcov --clean=false node scripts/PipelineE2eTest.js
      - uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
